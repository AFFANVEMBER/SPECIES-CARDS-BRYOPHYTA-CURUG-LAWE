function renderCards(filter) {
  const grid = document.getElementById('cardsGrid');
  grid.innerHTML = '';
  TAXA.forEach(t => {
    if (filter !== 'all' && t.type !== filter) return;
    const isH = t.type === 'hepaticae';
    const card = document.createElement('div');
    card.className = 'species-card';
    card.setAttribute('data-type', t.type);
    card.innerHTML = `
      <div class="card-accent ${isH ? 'accent-hepaticae' : 'accent-musci'}"></div>
      <div class="card-img-wrap" style="background:${isH ? '#f2f7ed' : '#e8f5f2'}">
        <div class="specimen-bg-pattern" style="color:${isH ? '#3B6D11' : '#0F6E56'}"></div>
        <div class="card-img-placeholder">
          <div class="specimen-icon">${t.icon}</div>
        </div>
      </div>
      <div class="card-body">
        <div class="card-code">${t.code} · ${t.family}</div>
        <div class="card-name-sci">${t.nameSci}</div>
        <div class="card-name-author">${t.author}</div>
        <span class="card-type-badge ${isH ? 'badge-hepaticae' : 'badge-musci'}">${isH ? 'Lumut Hati' : 'Lumut Daun'}</span>
        <div class="card-divider"></div>
        <div class="card-morfo">${t.morfo}</div>
        <div class="card-habitat"><i class="ti ti-map-pin" style="font-size:11px;flex-shrink:0;margin-top:1px" aria-hidden="true"></i>${t.habitat}</div>
        <button class="card-detail-btn" onclick="openDetail('${t.code}')">Lihat taksonomi lengkap ↗</button>
      </div>
    `;
    grid.appendChild(card);
  });
}

function filterCards(filter, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards(filter);
}

function openDetail(code) {
  const t = TAXA.find(x => x.code === code);
  if (!t) return;
  const isH = t.type === 'hepaticae';
  const accent = document.getElementById('detailAccent');
  accent.style.background = isH ? '#3B6D11' : '#0F6E56';

  const diagRows = Object.entries(t.diag).map(([k, v]) =>
    `<div class="diag-row">
      <span class="diag-label">${k}</span>
      <div class="diag-bar-wrap"><div class="diag-bar" style="width:${v}%;background:${isH ? '#639922' : '#1D9E75'}"></div></div>
      <span class="diag-val">${v < 60 ? 'rendah' : v < 80 ? 'sedang' : 'tinggi'}</span>
    </div>`
  ).join('');

  document.getElementById('detailContent').innerHTML = `
    <div class="detail-code">${t.code} · Specimen Field Record</div>
    <div class="detail-name-sci">${t.nameSci}</div>
    <div class="detail-author">${t.author}</div>
    <div class="detail-badges">
      <span class="detail-badge db-family">${t.family}</span>
      <span class="detail-badge ${isH ? 'db-type-h' : 'db-type-m'}">${isH ? 'Hepaticae' : 'Musci'}</span>
      <span class="detail-badge db-sub">${t.subtype}</span>
    </div>
    <div class="detail-taxa-grid">
      <div class="taxa-item"><div class="taxa-rank">Divisi</div><div class="taxa-value">${t.division}</div></div>
      <div class="taxa-item"><div class="taxa-rank">Kelas</div><div class="taxa-value">${t.classTax}</div></div>
      <div class="taxa-item"><div class="taxa-rank">Ordo</div><div class="taxa-value">${t.order}</div></div>
      <div class="taxa-item"><div class="taxa-rank">Famili</div><div class="taxa-value">${t.family}</div></div>
    </div>
    <div class="detail-diag-strip">
      <div class="diag-strip-title">Profil Karakter Diagnostik</div>
      ${diagRows}
    </div>
    <div class="detail-section">
      <div class="detail-section-title">Morfologi</div>
      <div class="detail-section-body">${t.morfo}</div>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">Habitat & Substrat</div>
      <div class="detail-section-body">${t.habitat}</div>
    </div>
    <div class="detail-section">
      <div class="detail-section-title">Catatan Taksonomi</div>
      <div class="detail-section-body">${t.catatan}</div>
    </div>
    <button class="card-detail-btn" style="margin-top:0" onclick="sendPrompt('Jelaskan lebih detail taksonomi dan ekologi ${t.nameSci} dalam konteks Bryophyta Asia Tenggara')">Eksplorasi lebih lanjut ↗</button>
  `;
  document.getElementById('detailOverlay').classList.add('open');
}

function closeDetail(e) {
  if (e.target === document.getElementById('detailOverlay')) closeDetailBtn();
}
function closeDetailBtn() {
  document.getElementById('detailOverlay').classList.remove('open');
}

renderCards('all');
</script>
